# Render Blueprint — https://render.com/docs/blueprint-spec
# Deploy: Render dashboard → "New +" → "Blueprint" → point at this repo.
# Field names match the Blueprint spec as of 2025; re-check Render's docs if a
# deploy fails on an unrecognized key, since the spec does evolve.
databases:
  - name: forge-postgres
    plan: free
    databaseName: forge_fitness
    user: forge

services:
  - type: web
    name: forge-backend
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: free
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 4000
      - key: DATABASE_URL
        fromDatabase:
          name: forge-postgres
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: COOKIE_SECURE
        value: true
      - key: COOKIE_SAMESITE
        value: none
      - key: CORS_ORIGIN
        value: https://forge-frontend-63u5.onrender.com
      - key: AI_PROVIDER
        value: none
      - key: APP_URL
        value: https://forge-frontend-63u5.onrender.com
      # Account-created confirmation email — off by default (registration
      # works fine either way). Set to "resend" or "smtp" plus the matching
      # credentials below to turn it on. See docs/CONFIGURATION.md.
      - key: EMAIL_PROVIDER
        value: none
      - key: EMAIL_FROM
        value: FORGE Fitness <onboarding@forge.fitness>
      - key: RESEND_API_KEY
        value: ''
      - key: SMTP_HOST
        value: ''
      - key: SMTP_PORT
        value: 587
      - key: SMTP_SECURE
        value: 'false'
      - key: SMTP_USER
        value: ''
      - key: SMTP_PASSWORD
        value: ''

  - type: web
    name: forge-frontend
    runtime: docker
    dockerfilePath: ./frontend/Dockerfile
    dockerContext: ./frontend
    plan: free
    envVars:
      # Read at container start (frontend/docker-entrypoint.sh), not baked in
      # at build time — update this if Render assigns a different backend URL.
      - key: API_BASE_URL
        value: https://forge-backend-x70k.onrender.com/api
