server {
  listen 80;
  listen [::]:80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  gzip on;
  gzip_types text/css application/javascript application/json image/svg+xml;

  add_header X-Content-Type-Options "nosniff" always;
  add_header X-Frame-Options "DENY" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;

  # Reverse-proxy API calls to the backend container so the SPA and API share
  # one origin — only takes effect when a "backend" host is actually
  # resolvable (e.g. the bundled docker-compose network). On split-domain
  # deployments (Render, Vercel, etc.) the frontend JS calls the backend's
  # full external URL directly instead (see API_BASE_URL) and this block is
  # simply never hit. Using a variable here (instead of a bare proxy_pass)
  # defers DNS resolution to request time so nginx still boots fine even
  # when "backend" doesn't exist on the network.
  resolver 127.0.0.11 valid=10s ipv6=off;
  location /api/ {
    set $upstream_backend backend:4000;
    # No URI segment here on purpose: with a variable host, nginx skips its
    # usual location-prefix rewrite, so omitting the path makes it forward
    # the original request URI (e.g. /api/health) unchanged — which is
    # exactly right since the backend's own routes are mounted at /api too.
    proxy_pass http://$upstream_backend;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location ~* \.(?:js|css|woff2?|png|jpg|svg|ico)$ {
    expires 7d;
    add_header Cache-Control "public, max-age=604800, immutable";
  }

  # SPA fallback — let React Router handle client-side routes.
  location / {
    try_files $uri $uri/ /index.html;
  }
}
