server {
  listen 80;
  listen [::]:80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  gzip on;
  gzip_types text/css application/javascript application/json image/svg+xml;

  add_header X-Content-Type-Options "nosniff" always;
  add_header X-Frame-Options "DENY" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;

  # Reverse-proxy API calls to the backend so the SPA and API share ONE
  # origin from the browser's point of view — this is what lets auth use a
  # normal first-party cookie regardless of how the two services are
  # actually deployed (same Docker network, or two separate Render
  # services on different domains). __BACKEND_ORIGIN__/__BACKEND_HOST__ are
  # replaced by docker-entrypoint.sh at container start, before nginx ever
  # parses this file — see that script for why a literal substitution is
  # used here instead of an nginx variable.
  location /api/ {
    proxy_pass __BACKEND_ORIGIN__;
    proxy_set_header Host __BACKEND_HOST__;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    # nginx doesn't send SNI to HTTPS upstreams by default. Platforms like
    # Render route by SNI at their edge (many customer domains share IPs),
    # so without this the TLS handshake fails before any HTTP even happens.
    # Harmless no-op when BACKEND_ORIGIN is a plain http:// target.
    proxy_ssl_server_name on;
  }

  # Regenerated fresh by docker-entrypoint.sh on every container start —
  # must never be cached, or a browser that loaded the site even once before
  # a config change (e.g. this very BACKEND_ORIGIN fix) keeps using the old
  # settings for as long as the cache lives. Exact-match locations are
  # matched before regex ones in nginx regardless of declaration order, so
  # this safely overrides the broad *.js rule below for this one file.
  location = /config.js {
    add_header Cache-Control "no-cache, no-store, must-revalidate" always;
    add_header Pragma "no-cache" always;
    expires off;
  }

  location ~* \.(?:js|css|woff2?|png|jpg|svg|ico)$ {
    expires 7d;
    add_header Cache-Control "public, max-age=604800, immutable";
  }

  # Standard SPA practice: never cache the entry HTML (it references the
  # content-hashed JS/CSS bundle URLs — caching it long-term is how you end
  # up loading new assets through old HTML, or vice versa, after a deploy).
  location = /index.html {
    add_header Cache-Control "no-cache, no-store, must-revalidate" always;
    expires off;
  }

  # SPA fallback — let React Router handle client-side routes.
  location / {
    try_files $uri $uri/ /index.html;
  }
}
